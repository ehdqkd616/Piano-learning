<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piano Learning — 로그 뷰어</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Consolas', 'D2Coding', 'Courier New', monospace;
      background: #0f0f1a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: #1a1a2e;
      border-bottom: 1px solid #2d2d4e;
      flex-shrink: 0;
      -webkit-app-region: drag;
    }
    .toolbar h2 {
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      flex: 1;
    }
    .filters {
      display: flex;
      gap: 5px;
      -webkit-app-region: no-drag;
    }
    .filter-btn {
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid #3d3d5e;
      background: transparent;
      color: #64748b;
      cursor: pointer;
      font-size: 0.68rem;
      font-family: inherit;
      transition: all 0.1s;
    }
    .filter-btn.active { color: #e2e8f0; border-color: #60b8ff; background: #1e2a3a; }
    .btn {
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid #3d3d5e;
      background: #2d2d4e;
      color: #94a3b8;
      cursor: pointer;
      font-size: 0.72rem;
      font-family: inherit;
      -webkit-app-region: no-drag;
    }
    .btn:hover { background: #3d3d5e; color: #e2e8f0; }

    .log-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .log-list::-webkit-scrollbar { width: 6px; }
    .log-list::-webkit-scrollbar-track { background: #0f0f1a; }
    .log-list::-webkit-scrollbar-thumb { background: #2d2d4e; border-radius: 3px; }

    .log-entry {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 2px 14px;
      font-size: 0.75rem;
      line-height: 1.6;
      border-left: 2px solid transparent;
      transition: background 0.05s;
    }
    .log-entry:hover { background: rgba(255,255,255,0.03); }
    .ts { color: #475569; flex-shrink: 0; font-size: 0.7rem; padding-top: 1px; }
    .badge {
      flex-shrink: 0;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-top: 2px;
    }
    .msg { word-break: break-all; color: #cbd5e1; flex: 1; }

    .log-info  { border-left-color: #334155; }
    .log-info .badge  { background: #1e293b; color: #64748b; }
    .log-midi  { border-left-color: #4ade80; }
    .log-midi .badge  { background: #14281a; color: #4ade80; }
    .log-midi .msg    { color: #a7f3d0; }
    .log-note  { border-left-color: #60b8ff; }
    .log-note .badge  { background: #0e1f3a; color: #60b8ff; }
    .log-note .msg    { color: #bfdbfe; }
    .log-warn  { border-left-color: #facc15; }
    .log-warn .badge  { background: #292109; color: #facc15; }
    .log-warn .msg    { color: #fef08a; }
    .log-error { border-left-color: #f87171; }
    .log-error .badge { background: #2a0f0f; color: #f87171; }
    .log-error .msg   { color: #fca5a5; }

    .status-bar {
      padding: 4px 14px;
      background: #12122a;
      border-top: 1px solid #2d2d4e;
      font-size: 0.68rem;
      color: #475569;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .auto-scroll-label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <h2>🎹 Piano Learning — 실시간 로그</h2>
    <div class="filters">
      <button class="filter-btn active" data-level="all">전체</button>
      <button class="filter-btn" data-level="midi">MIDI</button>
      <button class="filter-btn" data-level="note">노트</button>
      <button class="filter-btn" data-level="error">에러</button>
    </div>
    <button class="btn" id="btn-clear">지우기</button>
  </div>

  <div class="log-list" id="log-list"></div>

  <div class="status-bar">
    <span id="count">로그 0개</span>
    <label class="auto-scroll-label">
      <input type="checkbox" id="auto-scroll" checked>
      <span>자동 스크롤</span>
    </label>
  </div>

  <script>
    let count = 0
    let activeFilter = 'all'
    const list = document.getElementById('log-list')
    const countEl = document.getElementById('count')
    const autoScrollEl = document.getElementById('auto-scroll')

    document.getElementById('btn-clear').addEventListener('click', () => {
      list.innerHTML = ''
      count = 0
      countEl.textContent = '로그 0개'
    })

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
        activeFilter = btn.dataset.level
        document.querySelectorAll('.log-entry').forEach(e => {
          e.style.display = (activeFilter === 'all' || e.dataset.level === activeFilter) ? '' : 'none'
        })
      })
    })

    function addLog({ level, message, time }) {
      const entry = document.createElement('div')
      entry.className = `log-entry log-${level}`
      entry.dataset.level = level

      if (activeFilter !== 'all' && level !== activeFilter) {
        entry.style.display = 'none'
      }

      const d = new Date(time)
      const pad = n => String(n).padStart(2, '0')
      const ms = String(d.getMilliseconds()).padStart(3, '0')
      const ts = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}.${ms}`

      entry.innerHTML = `<span class="ts">${ts}</span><span class="badge">${level}</span><span class="msg">${escHtml(message)}</span>`
      list.appendChild(entry)
      count++
      countEl.textContent = `로그 ${count}개`

      if (autoScrollEl.checked) {
        list.scrollTop = list.scrollHeight
      }
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
    }

    window.logAPI.onLog(addLog)
  </script>
</body>
</html>
